id: "CASE02"
name: "删除设备后重新配网成功"
description: "删除已绑定的目标设备，在设备自动进入配网模式后的三分钟内重新添加，并验证最终进入设备详情页。"
module: "设备配网"
priority: ""
tags: []

execution:
  repeatable: true
  destructive: false
  manual_setup_required: false
  manual_cleanup_required: false
  default_regression_enabled: false

preconditions:
  - "设备已经与智能生活 App 配网成功"
  - "设备当前在线"
  - "设备名称与 environment.iot_device.name 一致"
  - "删除成功后设备自动进入配网模式，并持续三分钟"
  - "手机已连接用于设备配网的 Wi-Fi"

test_data:
  device_name:
    value_ref: "environment.iot_device.name"
  device_type:
    value_ref: "environment.iot_device.type"
  wifi_information_source: "当前手机连接的 Wi-Fi，由 App 默认填充"

steps:
  - id: 1
    action: "查找，必要时滚动"
    target: "智能生活 App 首页中的目标设备"
    value: ""
    value_ref: "environment.iot_device.name"
    expected:
      - "首页存在目标设备"
  - id: 2
    action: "进入详情页并打开高级设置"
    target: "目标设备"
    value: ""
    value_ref: "environment.iot_device.name"
    expected:
      - "高级设置页存在“移除设备”按钮"
  - id: 3
    action: "点击并选择"
    target: "移除设备中的解除绑定选项"
    value: ""
    value_ref: ""
    expected:
      - "显示标题为“确定要解绑设备吗？”的二次确认弹窗"
  - id: 4
    action: "点击"
    target: "二次确认弹窗中的确定按钮"
    value: ""
    value_ref: ""
    expected:
      - "删除成功并返回智能生活 App 首页"
      - "首页不存在目标设备"
  - id: 5
    action: "点击"
    target: "首页右上角的加号"
    value: ""
    value_ref: ""
    expected:
      - "显示二级菜单"
      - "二级菜单第一个选项为“添加设备”"
  - id: 6
    action: "点击"
    target: "添加设备按钮"
    value: ""
    value_ref: ""
    expected:
      - "进入标题为“添加设备”的页面"
      - "页面出现环境配置中的设备类型"
  - id: 7
    action: "点击"
    target: "环境配置中的设备类型"
    value: ""
    value_ref: "environment.iot_device.type"
    expected:
      - "底部显示标题为“请输入Wi-Fi信息”的弹窗"
      - "App 默认显示当前手机连接的 Wi-Fi 信息"
      - "弹窗底部存在“下一步”按钮"
  - id: 8
    action: "点击"
    target: "Wi-Fi 信息弹窗中的下一步按钮"
    value: ""
    value_ref: ""
    expected:
      - "页面标题为“添加设备”"
      - "页面显示目标设备类型和“正在添加”"
      - "页面显示配网进度"
  - id: 9
    action: "等待"
    target: "配网完成"
    value: ""
    value_ref: ""
    expected:
      - "温湿度传感器图标显示绿色对勾"
      - "列表显示添加成功"
      - "页面底部出现“完成”按钮"
  - id: 10
    action: "点击"
    target: "完成按钮"
    value: ""
    value_ref: ""
    expected:
      - "先返回智能生活 App 首页"
      - "随后进入目标设备详情页"
      - "详情页显示设备名称、温度和湿度"

expected:
  - "目标设备删除后重新配网成功"
  - "用例结束时目标设备已恢复到账号并可进入设备详情页"

cleanup: []
missing_info: []
review_questions: []

source_file: "appium_auto/specs/raw/CASE02删除设备后重新配网成功.txt"
source_text: |
  前置条件：
  1、设备已经和涂鸦的智能生活app配网成功，
  2、设备当前在线,在智能生活app里名称是"V4#4"
  3、删除设备成功后，需在3分钟内完成配网

  操作步骤和预期结果
  1、参考CASE01删除设备成功.txt，删除设备
  预期结果：删除成功，智能生活app，首页没有名称为"V4#4"的设备
  2、点击右上角的“+”号，
  预期结果：出来二级菜单，二级菜单第一个选项为“添加设备”
  3、点击“添加设备”按钮
  预期：跳转到添加设备页面，页面顶部标题为“添加设备”。等待页面出现“Wi-Fi温湿度传感器”图标
  4、点击“Wi-Fi温湿度传感器”图标
  预期结果：底部出来弹窗，标题是“请输入Wi-Fi信息”。默认显示当前手机连接的Wi-Fi的信息，包括Wi-Fi名称和密码。弹窗底部有下一步按钮
  5、点击"下一步"按钮
  预期结果：开始配网。页面标题为“添加设备”，页面有“Wi-Fi温湿度传感器”文案和图标，文案下面有“正在添加”字样，列数据右边有进度条，加载中
  6、配网过程可能持续10-30秒不等，等配网成功
  预期结果：温湿度传感器图标右上角有绿色对勾图标，列表数据有文案显示添加成功，底部出现“完成”按钮
  7、点击“完成”按钮
  预期结果：先回到智能涂鸦生活app首页，随后进入到V4#4设备详情页，显示设备名称，温度，湿度等信息。
