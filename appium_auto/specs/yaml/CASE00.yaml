source_file: "appium_auto/cases/CASE00-进入设备详情页并查看设备信息"
source_text: |
  CASE00：进入设备详情页并查看设备信息

  前置条件：

  设备已经与智能生活 App 配网；
  设备名称是 V4#4；
  设备当前在线；
  用户已经登录。

  步骤：

  启动智能生活 App；
  在首页找到名称为 V4#4 的设备；
  如果当前屏幕没有显示设备，则滚动设备列表；
  点击 V4#4 设备卡片。

  预期结果：

  成功进入设备详情页；
  页面显示设备相关信息；
  页面存在温度区域；
  页面存在湿度区域。

  然后继续：

  点击右上角修改图标。

  预期结果：

  成功进入高级设置页；
  页面存在“移除设备”按钮。

  最后：

  返回设备详情页；
  返回首页。

  预期结果：

  首页仍然存在 V4#4；
  用例结束以后，设备和账号状态没有被修改。
